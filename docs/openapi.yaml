      type: object
      additionalProperties: false
      required: [requests]
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/JudicialRequest'
    JudicialRequestResponse:
      type: object
      required: [judicialRequest]
      properties:
        judicialRequest:
          $ref: '#/components/schemas/JudicialRequest'
    JudicialExecutionResponse:
      type: object
      additionalProperties: false
      required: [judicialRequest, export]
      properties:
        judicialRequest:
          $ref: '#/components/schemas/JudicialRequest'
        export:
          type: object
          additionalProperties: false
          required: [fingerprint, expiresAt, rowCount, envelope]
          properties:
            fingerprint:
              type: string
              pattern: '^[a-f0-9]{64}$'
            expiresAt:
              type: string
              format: date-time
            rowCount:
              type: integer
              minimum: 0
              maximum: 50
            envelope:
              type: object
              additionalProperties: false
              required: [algorithm, keyRef, iv, authTag, ciphertext]
              properties:
                algorithm:
                  const: aes-256-gcm
                keyRef:
                  type: string
                  description: Approved decryption-key reference; never the key itself.
                iv:
                  type: string
                authTag:
                  type: string
                ciphertext:
                  type: string
                  description: Encrypted minimal code-to-contact export. Handle as highly sensitive data.
paths:
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      summary: Check whether the API process is alive
      security: []
      responses:
        '200':
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      summary: Check database and durable-queue readiness
      security: []
      responses:
        '200':
          description: Both database domains and the durable outbound queue model are reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
