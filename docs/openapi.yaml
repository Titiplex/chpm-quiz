openapi: 3.1.0
info:
  title: CHPM Survey API
  version: 0.9.0-preprod
  description: API REST JSON pour questionnaires adaptatifs, invitations, passation répondant, statistiques, conformité, administration projet/site et accès DPO hors API métier.
servers:
  - url: /api
security:
  - sessionCookie: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: chpm_session
    respondentToken:
      type: apiKey
      in: query
      name: token
  responses:
    Forbidden:
      description: Droits insuffisants
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ErrorResponse:
      type: object
      required: [statusCode, error, path, timestamp]
      properties:
        statusCode: { type: integer }
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items: { type: string }
        path: { type: string }
        timestamp: { type: string, format: date-time }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    PublicUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        role:
          type: string
          enum: [admin, moderator, site_manager, questionnaire_admin, analyst, dpo, judicial_officer, technical_admin, service_account, respondent]
        permissions:
          type: array
          items: { type: string }
    SiteTeamUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [site_manager, moderator] }
        isActive: { type: boolean }
        siteId: { type: string, format: uuid, nullable: true }
        buildingId: { type: string, format: uuid, nullable: true }
    Site:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        organizationId: { type: string, format: uuid }
    SiteAdminUser:
      allOf:
        - $ref: '#/components/schemas/SiteTeamUser'
        - type: object
          properties:
            role: { type: string, enum: [site_manager] }
    CreateSiteAdminRequest:
      type: object
      required: [email, displayName, siteId]
      properties:
        email: { type: string, format: email }
        displayName: { type: string, minLength: 2, maxLength: 120 }
        siteId: { type: string, format: uuid }
        temporaryPassword: { type: string, minLength: 12, maxLength: 128 }
    UpdateSiteAdminRequest:
      type: object
      properties:
        displayName: { type: string, minLength: 2, maxLength: 120 }
        siteId: { type: string, format: uuid }
        isActive: { type: boolean }
    RevokeSessionsResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/SiteTeamUser' }
        revokedSessionCount: { type: integer }
    CreateSiteModeratorRequest:
      type: object
      required: [email, displayName, buildingId]
      properties:
        email: { type: string, format: email }
        displayName: { type: string, minLength: 2, maxLength: 120 }
        buildingId: { type: string, format: uuid }
        temporaryPassword: { type: string, minLength: 12, maxLength: 128 }
    UpdateSiteModeratorRequest:
      type: object
      properties:
        displayName: { type: string, minLength: 2, maxLength: 120 }
        buildingId: { type: string, format: uuid }
        isActive: { type: boolean }
    PseudonymizedExport:
      type: object
      properties:
        generatedAt: { type: string, format: date-time }
        containsDirectEmail: { type: boolean, const: false }
        identityVaultExcluded: { type: boolean, const: true }
        threshold: { type: integer }
        suppressedByThreshold: { type: boolean }
        fingerprint: { type: string }
        rows:
          type: array
          items: { type: object }
paths:
  /health/live:
    get:
      summary: Sonde de vie conteneur
      security: []
      responses:
        '200': { description: API process alive }
  /health/ready:
    get:
      summary: Sonde de readiness avec bases opérationnelle et identité
      security: []
      responses:
        '200': { description: API ready }
        '503': { description: Base indisponible }
  /metrics:
    get:
      summary: Métriques JSON techniques
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Métriques API, erreurs, latence, autosave, jetons invalides et exports inhabituels }
        '403': { $ref: '#/components/responses/Forbidden' }
  /metrics/prometheus:
    get:
      summary: Métriques Prometheus
      security: [{ sessionCookie: [] }]
      responses:
        '200': { description: Flux text/plain Prometheus }
  /auth/login:
    post:
      summary: Connexion utilisateur interne et pose du cookie HttpOnly
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '201': { description: Profil connecté }
        '401': { description: Identifiants invalides }
  /auth/me:
    get:
      summary: Profil connecté
      responses:
        '200': { description: Profil et permissions }
        '401': { description: Session absente ou expirée }
  /auth/logout:
    post:
      summary: Déconnexion et suppression du cookie
      responses:
        '201': { description: Session supprimée }
  /me:
    get:
      summary: Alias profil utilisateur authentifié
      responses:
        '200': { description: Profil courant }
  /buildings:
    get:
      summary: Bâtiments filtrés par périmètre
      responses:
        '200': { description: Liste des bâtiments accessibles }
  /admin/sites:
    get:
      summary: Liste des sites administrables par un admin projet
      description: Réservé à `admin` technique, c'est-à-dire administrateur projet / chercheur. Ne retourne aucune donnée répondant.
      responses:
        '200': { description: Sites, content: { application/json: { schema: { type: object, properties: { sites: { type: array, items: { $ref: '#/components/schemas/Site' } } } } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/site-admins:
    get:
      summary: Liste des responsables de site
      description: Réservé aux administrateurs projet. Ne retourne que les comptes internes responsables de site.
      responses:
        '200': { description: Responsables de site }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Création d'un responsable de site
      description: Réservé aux administrateurs projet. Interdit pour créer DPO, admin projet, technical admin ou judiciaire.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSiteAdminRequest' }
      responses:
        '201': { description: Responsable créé avec mot de passe temporaire affiché une seule fois }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/site-admins/{id}:
    patch:
      summary: Mise à jour d'un responsable de site
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSiteAdminRequest' }
      responses:
        '200': { description: Responsable mis à jour, sessions révoquées si périmètre ou état change }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/site-admins/{id}/reset-password:
    post:
      summary: Réinitialisation du mot de passe d'un responsable de site
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Mot de passe temporaire retourné une seule fois, sessions révoquées }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/site-admins/{id}/revoke-sessions:
    post:
      summary: Révocation des sessions d'un responsable de site
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Sessions révoquées, audit créé, schema: { $ref: '#/components/schemas/RevokeSessionsResponse' } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /site/team:
    get:
      summary: Liste des modérateurs du site courant
      description: Réservé à `site_manager`. Ne retourne aucun responsable de site hors périmètre ni donnée répondant.
      responses:
        '200': { description: Modérateurs du site }
        '403': { $ref: '#/components/responses/Forbidden' }
  /site/moderators:
    post:
      summary: Création ou réactivation d'un modérateur dans le site courant
      description: Réservé à `site_manager`; le bâtiment doit appartenir au site du responsable.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSiteModeratorRequest' }
      responses:
        '201': { description: Modérateur créé avec mot de passe temporaire affiché une seule fois }
        '403': { $ref: '#/components/responses/Forbidden' }
  /site/moderators/{id}:
    patch:
      summary: Mise à jour d'un modérateur du site courant
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSiteModeratorRequest' }
      responses:
        '200': { description: Modérateur mis à jour }
        '403': { $ref: '#/components/responses/Forbidden' }
  /site/moderators/{id}/reset-password:
    post:
      summary: Réinitialisation du mot de passe d'un modérateur du site courant
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Mot de passe temporaire retourné une seule fois, sessions révoquées }
        '403': { $ref: '#/components/responses/Forbidden' }
  /site/moderators/{id}/revoke-sessions:
    post:
      summary: Révocation des sessions d'un modérateur du site courant
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Sessions révoquées, audit créé, schema: { $ref: '#/components/schemas/RevokeSessionsResponse' } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/site-team:
    get:
      summary: Alias historique de /site/team
      deprecated: true
      description: Réservé aux responsables de site. Conservé temporairement pour compatibilité ; utiliser /site/team.
      responses:
        '200': { description: Equipe de site filtrée par RBAC/ABAC }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/site-moderators:
    post:
      summary: Alias historique de /site/moderators
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSiteModeratorRequest' }
      responses:
        '201': { description: Modérateur créé avec mot de passe temporaire affiché une seule fois }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/site-moderators/{id}:
    patch:
      summary: Alias historique de /site/moderators/{id}
      deprecated: true
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSiteModeratorRequest' }
      responses:
        '200': { description: Modérateur mis à jour et sessions révoquées si nécessaire }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/site-moderators/{id}/reset-password:
    post:
      summary: Alias historique de /site/moderators/{id}/reset-password
      deprecated: true
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Mot de passe temporaire retourné une seule fois, sessions révoquées }
        '403': { $ref: '#/components/responses/Forbidden' }
  /questionnaires:
    get:
      summary: Liste des questionnaires accessibles
      responses:
        '200': { description: Questionnaires avec versions et groupes selon rôle }
    post:
      summary: Création questionnaire brouillon
      responses:
        '201': { description: Questionnaire créé }
  /questionnaires/{id}:
    get:
      summary: Détail questionnaire
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Questionnaire }
    patch:
      summary: Mise à jour questionnaire brouillon
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Questionnaire mis à jour }
  /questionnaires/{id}/versions:
    get:
      summary: Versions d'un questionnaire
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Versions }
    post:
      summary: Création version brouillon
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Version créée }
  /versions/{id}/publish:
    post:
      summary: Publication immutable après validation
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Version publiée }
  /moderation/invitations:
    get:
      summary: Suivi des invitations du périmètre
      responses:
        '200': { description: Invitations }
    post:
      summary: Création invitation avec code unique et jeton signé
      responses:
        '201': { description: Invitation créée }
  /moderation/invitations/{id}/resend:
    post:
      summary: Relance d'une invitation non soumise
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '201': { description: Relance exécutée ou simulée }
  /respondent/session:
    get:
      summary: Résolution du jeton répondant
      security: [{ respondentToken: [] }]
      responses:
        '200': { description: Session répondant et questionnaire rendu }
        '401': { description: Jeton invalide }
        '403': { description: Jeton expiré ou invitation bloquée }
  /respondent/answers:
    put:
      summary: Sauvegarde autosave des réponses brouillon
      security: [{ respondentToken: [] }]
      responses:
        '200': { description: Réponses sauvegardées }
  /respondent/telemetry:
    post:
      summary: Enregistrement télémétrie popup/navigation/temps
      security: [{ respondentToken: [] }]
      responses:
        '201': { description: Evénement enregistré }
  /respondent/submit:
    post:
      summary: Soumission finale verrouillée
      security: [{ respondentToken: [] }]
      responses:
        '201': { description: Soumission créée et verrouillée }
  /stats/questionnaires/{id}:
    get:
      summary: Statistiques agrégées seuillées
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Volumes, durées, completion, seuil anti-réidentification }
  /stats/submissions/{publicCode}:
    get:
      summary: Soumission pseudonymisée par code public
      parameters: [{ name: publicCode, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: Soumission sans email }
  /notifications/subscriptions:
    get:
      summary: Préférences de notification
      responses: { '200': { description: Subscriptions } }
    post:
      summary: Création préférence notification
      responses: { '201': { description: Subscription créée } }
  /audit-logs:
    get:
      summary: Journaux d'audit selon habilitation
      responses:
        '200': { description: Audit logs }
  /compliance/technical-register:
    get:
      summary: Registre technique RGPD simplifié
      responses:
        '200': { description: Registre }
  /compliance/retention-policy:
    get:
      summary: Politique de conservation et purge
      responses:
        '200': { description: Politique }
  /compliance/exports/pseudonymized:
    get:
      summary: Export pseudonymisé sans base identité
      responses:
        '200': { description: Export, empreinte et seuils, schema: { $ref: '#/components/schemas/PseudonymizedExport' } }
  /judicial-access/requests:
    get:
      summary: Liste des demandes judiciaires habilitées
      responses:
        '200': { description: Demandes }
    post:
      summary: Enregistrement administratif d'une demande exceptionnelle
      description: Ne retourne jamais la correspondance code-email. L'export identity vault est réservé à la console DPO dédiée.
      responses:
        '201': { description: Demande créée }
