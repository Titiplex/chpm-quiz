openapi: 3.1.0
info:
  title: CHPM Survey API
  version: 1.0.0
  summary: Role- and scope-aware questionnaire collection API
  description: |
    REST API for internal staff authentication, scoped administration, questionnaire
    authoring/versioning, invitation delivery, token-based respondent sessions, managed
    terminals, pseudonymized statistics, compliance operations, notifications, audit,
    and the controlled exceptional legal-access workflow.

    The specification describes implemented NestJS controller operations only. Direct
    respondent contact data is not available through normal business endpoints. The
    exceptional DPO export is allowed only after independent DPO and legal validation,
    is restricted to explicit public codes, returns an AES-256-GCM encrypted envelope,
    expires automatically, and is fully audited. The local DPO console enforces the same
    approved-request prerequisite.

    Version 1.0 is the production handover contract. Compatibility changes follow the
    release and upgrade procedure in `docs/production/installation.md`.
  contact:
    name: CHPM Survey maintainers
  license:
    name: Proprietary / internal project
    identifier: LicenseRef-Proprietary
servers:
  - url: /api
    description: Same-origin reverse-proxy deployment
tags:
  - name: Health
    description: Public process and dependency probes.
  - name: Observability
    description: Technical-administrator metrics.
  - name: Authentication
    description: Internal staff session lifecycle.
  - name: Buildings
    description: Role- and scope-filtered building reference data.
  - name: Project administration
    description: Project administrator management of sites and site-manager accounts.
  - name: Site administration
    description: Site-manager delegation to moderators.
  - name: Questionnaires
    description: Questionnaire metadata, groups, questions, and preview.
  - name: Versions
    description: Version lifecycle, conditional rules, publication checks, and publication.
  - name: Moderation
    description: Scoped invitations, resends, paper entry, and terminal compatibility routes.
  - name: Respondent
    description: Public secret-token session, autosave, telemetry, and final submission.
  - name: Terminals
    description: Managed on-site terminal administration and token-bound operation.
  - name: Statistics
    description: Threshold-protected aggregates and analyst-only pseudonymized detail.
  - name: Notifications
    description: Staff event subscriptions and digest processing.
  - name: Compliance
    description: Technical register, retention, maintenance, and pseudonymized export.
  - name: Identity boundary
    description: Technical boundary status and denied-access evidence; no identity export.
  - name: Judicial workflow
    description: Exceptional request authorization-state and secure-document metadata.
  - name: Audit
    description: Authorized operational audit reads.
security:
  - sessionCookie: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: chpm_session
      description: Opaque internal staff session. Only a SHA-256 hash is stored server-side.
    respondentQueryToken:
      type: apiKey
      in: query
      name: token
      description: Signed secret bound to one respondent invitation/session.
    terminalQueryToken:
      type: apiKey
      in: query
      name: token
      description: Secret managed-device token used by the public terminal session endpoint.
    metricsBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Dedicated monitoring token supplied through `METRICS_TOKEN`; not a staff session.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestionnaireId:
      name: id
      in: path
      required: true
      description: Questionnaire identifier.
      schema:
        type: string
        format: uuid
    VersionId:
      name: id
      in: path
      required: true
      description: Questionnaire version identifier.
      schema:
        type: string
        format: uuid
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestionId:
      name: questionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PublicCode:
      name: publicCode
      in: path
      required: true
      schema:
        type: string
        minLength: 4
        maxLength: 64
        pattern: '^[A-Z0-9-]+$'
    AuditLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of recent audit rows. The service applies its own safe bounds.
      schema:
        type: integer
        minimum: 1
        maximum: 200
    QuestionnaireIdQuery:
      name: questionnaireId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    RespondentToken:
      name: token
      in: query
      required: true
      description: Secret respondent token from the invitation link. Do not log or persist in analytics.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    OptionalTerminalToken:
      name: terminalToken
      in: query
      required: false
      description: Required when the respondent session was opened through a managed terminal.
      schema:
        type: string
        minLength: 1
        maxLength: 512
  headers:
    RequestId:
      description: Accepted or generated request/correlation identifier.
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    BadRequest:
      description: Invalid payload, query, path value, or workflow request.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
        X-Correlation-ID:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, expired, revoked, or inactive session/token.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated caller lacks the required role or object scope.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Object does not exist or is intentionally hidden because it is outside the caller's scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicate or invalid lifecycle transition, including immutable/already-submitted state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: In-process request-rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitResponse'
    ServiceUnavailable:
      description: Required dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReadinessResponse'
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [statusCode, error, path, timestamp]
      properties:
        statusCode:
          type: integer
          minimum: 400
          maximum: 599
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR]
            message:
              type: string
            details:
              type: array
              items:
                type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time
    RateLimitResponse:
      type: object
      additionalProperties: false
      required: [message, error]
      description: Rate-limit middleware response, emitted before the global exception filter.
      properties:
        message:
          type: string
        error:
          const: Rate limit
    UserRole:
      type: string
      enum:
        - admin
        - site_manager
        - moderator
        - questionnaire_admin
        - analyst
        - dpo
        - judicial_officer
        - technical_admin
        - service_account
        - respondent
    Permission:
      type: string
      pattern: '^[a-z]+:[A-Za-z]+$'
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, timestamp]
      properties:
        status:
          const: ok
        service:
          type: string
          examples: [chpm-api]
        timestamp:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [status, service, checks, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        checks:
          type: object
          additionalProperties: false
          required: [operationalDatabase, identityDatabase, deliveryQueue]
          properties:
            operationalDatabase:
              type: string
              enum: [ok, failed]
            identityDatabase:
              type: string
              enum: [ok, failed]
            deliveryQueue:
              type: string
              enum: [ok, failed]
        timestamp:
          type: string
          format: date-time
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 256
          writeOnly: true
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 1
          maxLength: 200
          writeOnly: true
        newPassword:
          type: string
          format: password
          minLength: 12
          maxLength: 200
          writeOnly: true
          description: Must satisfy the server password policy and differ from the current password.
    AuthConfigResponse:
      type: object
      additionalProperties: false
      required: [provider, localLoginEnabled, oidcEnabled]
      properties:
        provider:
          type: string
          enum: [local, oidc, saml]
        localLoginEnabled:
          type: boolean
        oidcEnabled:
          type: boolean
    PublicUser:
      type: object
      required: [id, email, displayName, role, permissions, building, mustChangePassword]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: Internal staff account email, never a respondent contact value.
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        permissions:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Permission'
        mustChangePassword:
          type: boolean
          description: Forces local-authentication users through password rotation before other protected pages.
        building:
          oneOf:
            - $ref: '#/components/schemas/Building'
            - type: 'null'
    AuthResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
    OkResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          const: true
    Building:
      type: object
      required: [id, code, label, city, country, timezone]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        label:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
          examples: [America/Toronto]
        siteId:
          type: [string, 'null']
          format: uuid
        organizationId:
          type: [string, 'null']
          format: uuid
    BuildingsResponse:
      type: object
      additionalProperties: false
      required: [buildings]
      properties:
        buildings:
          type: array
          items:
            $ref: '#/components/schemas/Building'
    CreateBuildingRequest:
      type: object
      additionalProperties: false
      required: [code, label, city, country, timezone]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 40
          pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'
        label:
          type: string
          minLength: 2
          maxLength: 160
        city:
          type: string
          minLength: 2
          maxLength: 100
        country:
          type: string
          minLength: 2
          maxLength: 100
        timezone:
          type: string
          minLength: 3
          maxLength: 100
    BuildingResponse:
      type: object
      additionalProperties: false
      required: [building]
      properties:
        building:
          $ref: '#/components/schemas/Building'
    OrganizationSummary:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
    Site:
      type: object
      required: [id, code, name, organizationId]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        organizationId:
          type: string
          format: uuid
        organization:
          oneOf:
            - $ref: '#/components/schemas/OrganizationSummary'
            - type: 'null'
        country:
          type: [string, 'null']
        timezone:
          type: [string, 'null']
    SitesResponse:
      type: object
      additionalProperties: false
      required: [sites]
      properties:
        sites:
          type: array
          items:
            $ref: '#/components/schemas/Site'
    CreateSiteRequest:
      type: object
      additionalProperties: false
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 40
          pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'
        name:
          type: string
          minLength: 2
          maxLength: 160
        country:
          type: string
          maxLength: 100
        timezone:
          type: string
          maxLength: 100
    SiteResponse:
      type: object
      additionalProperties: false
      required: [site]
      properties:
        site:
          $ref: '#/components/schemas/Site'
    SiteTeamUser:
      type: object
      required: [id, email, displayName, role, isActive, organizationId, siteId, buildingId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: Internal staff account email.
        displayName:
          type: string
        role:
          type: string
          enum: [site_manager, moderator]
        roleLabel:
          type: string
        isActive:
          type: boolean
        organizationId:
          type: [string, 'null']
          format: uuid
        siteId:
          type: [string, 'null']
          format: uuid
        buildingId:
          type: [string, 'null']
          format: uuid
        site:
          oneOf:
            - $ref: '#/components/schemas/Site'
            - type: 'null'
        building:
          oneOf:
            - $ref: '#/components/schemas/Building'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SiteAdminsResponse:
      type: object
      required: [users, policy]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/SiteTeamUser'
        policy:
          type: object
          required: [manageableRoles, scope, passwordReturnedOnce, forbiddenRoles]
          properties:
            manageableRoles:
              type: array
              items:
                const: site_manager
            scope:
              const: project
            passwordReturnedOnce:
              const: true
            forbiddenRoles:
              type: array
              items:
                $ref: '#/components/schemas/UserRole'
    SiteTeamResponse:
      type: object
      required: [users, policy]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/SiteTeamUser'
        policy:
          type: object
          required: [manageableRoles, scope, passwordReturnedOnce]
          properties:
            manageableRoles:
              type: array
              items:
                const: moderator
            scope:
              const: site
            passwordReturnedOnce:
              const: true
    ProjectHierarchyNode:
      type: object
      additionalProperties: false
      required: [id, kind, label, subtitle, role, isActive, isCurrentUser, children]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [project, project_admin, site, site_manager, moderator, team]
        label:
          type: string
        subtitle:
          type: [string, 'null']
        role:
          type: [string, 'null']
          enum: [admin, site_manager, moderator, null]
        isActive:
          type: [boolean, 'null']
        isCurrentUser:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/ProjectHierarchyNode'
    ProjectHierarchyResponse:
      type: object
      additionalProperties: false
      required: [hierarchy, scope, generatedAt]
      properties:
        hierarchy:
          $ref: '#/components/schemas/ProjectHierarchyNode'
        scope:
          type: string
          enum: [project, site, self]
        generatedAt:
          type: string
          format: date-time
    CreateSiteAdminRequest:
      type: object
      additionalProperties: false
      required: [email, displayName, siteId]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        displayName:
          type: string
          minLength: 2
          maxLength: 120
        siteId:
          type: string
          format: uuid
        temporaryPassword:
          type: string
          format: password
          minLength: 12
          maxLength: 128
          writeOnly: true
    UpdateSiteAdminRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 120
        siteId:
          type: string
          format: uuid
        isActive:
          type: boolean
    CreateSiteModeratorRequest:
      type: object
      additionalProperties: false
      required: [email, displayName, buildingId]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        displayName:
          type: string
          minLength: 2
          maxLength: 120
        buildingId:
          type: string
          format: uuid
        temporaryPassword:
          type: string
          format: password
          minLength: 12
          maxLength: 128
          writeOnly: true
    UpdateSiteModeratorRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 120
        buildingId:
          type: string
          format: uuid
        isActive:
          type: boolean
    UserMutationResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/SiteTeamUser'
        temporaryPassword:
          type: string
          format: password
          readOnly: true
          description: Returned once when generated/reset. Never log or persist in application storage.
        temporaryPasswordGenerated:
          type: boolean
    RevokeSessionsResponse:
      type: object
      additionalProperties: false
      required: [user, revokedSessionCount]
      properties:
        user:
          $ref: '#/components/schemas/SiteTeamUser'
        revokedSessionCount:
          type: integer
          minimum: 0
    QuestionType:
      type: string
      enum: [free_text, free_text_short, free_text_long, likert, single_choice, multiple_choice, number, date, information]
    ConditionExpression:
      type: object
      description: Recursive condition expression interpreted by questionnaire services.
      additionalProperties: true
    AnswerOptionRequest:
      type: object
      additionalProperties: false
      required: [value, label]
      properties:
        value:
          type: string
          minLength: 1
          maxLength: 80
        label:
          type: string
          minLength: 1
          maxLength: 200
        displayOrder:
          type: integer
          minimum: 1
          maximum: 500
        isExclusive:
          type: boolean
    LikertScaleRequest:
      type: object
      additionalProperties: false
      required: [points, leftAnchor, rightAnchor]
      properties:
        points:
          type: integer
          minimum: 3
          maximum: 10
        minValue:
          type: integer
          minimum: 0
          maximum: 10
        leftAnchor:
          type: string
          minLength: 2
          maxLength: 80
        rightAnchor:
          type: string
          minLength: 2
          maxLength: 80
        neutralLabel:
          type: string
          maxLength: 80
        allowNotApplicable:
          type: boolean
    PopupDefinitionRequest:
      type: object
      additionalProperties: false
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 120
        body:
          type: string
          minLength: 5
          maxLength: 2000
        termsExplained:
          type: array
          maxItems: 8
          items:
            type: string
            maxLength: 80
    CreateQuestionnaireRequest:
      type: object
      additionalProperties: false
      required: [code, title]
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 40
        title:
          type: string
          minLength: 3
          maxLength: 160
        description:
          type: string
          maxLength: 2000
        defaultLanguage:
          type: string
          minLength: 2
          maxLength: 12
        finality:
          type: string
          maxLength: 2000
    CreateTranslationRequest:
      type: object
      additionalProperties: false
      required: [language]
      properties:
        language:
          type: string
          enum: [fr, en, es]
        title:
          type: string
          minLength: 3
          maxLength: 160
        description:
          type: string
          maxLength: 2000
        finality:
          type: string
          maxLength: 2000
      description: Creates a separate draft questionnaire by cloning structure and conditional references from the source language.
    UpdateQuestionnaireRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 160
        description:
          type: string
          maxLength: 2000
        defaultLanguage:
          type: string
          minLength: 2
          maxLength: 12
        finality:
          type: string
          maxLength: 2000
    CreateQuestionGroupRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 160
        description:
          type: string
          maxLength: 1000
        displayOrder:
          type: integer
          minimum: 1
          maximum: 100
        questionsPerPage:
          type: integer
          minimum: 1
          maximum: 20
        randomize:
          type: boolean
        conditionExpression:
          $ref: '#/components/schemas/ConditionExpression'
    UpdateQuestionGroupRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 160
        description:
          type: string
          maxLength: 1000
        displayOrder:
          type: integer
          minimum: 1
          maximum: 100
        questionsPerPage:
          type: integer
          minimum: 1
          maximum: 20
        randomize:
          type: boolean
        conditionExpression:
          $ref: '#/components/schemas/ConditionExpression'
    CreateQuestionRequest:
      type: object
      additionalProperties: false
      required: [code, label, responseType]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 40
        label:
          type: string
          minLength: 3
          maxLength: 500
        helperText:
          type: string
          maxLength: 1000
        responseType:
          $ref: '#/components/schemas/QuestionType'
        isRequired:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
          maximum: 500
        conditionExpression:
          $ref: '#/components/schemas/ConditionExpression'
        answerOptions:
          type: array
          maxItems: 30
          items:
            $ref: '#/components/schemas/AnswerOptionRequest'
        likertScale:
          $ref: '#/components/schemas/LikertScaleRequest'
        popupDefinition:
          $ref: '#/components/schemas/PopupDefinitionRequest'
      description: answerOptions are required for choice types; likertScale is required for likert.
    UpdateQuestionRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 40
        label:
          type: string
          minLength: 3
          maxLength: 500
        helperText:
          type: string
          maxLength: 1000
        responseType:
          $ref: '#/components/schemas/QuestionType'
        isRequired:
          type: boolean
        displayOrder:
          type: integer
          minimum: 1
          maximum: 500
        conditionExpression:
          $ref: '#/components/schemas/ConditionExpression'
        answerOptions:
          type: array
          maxItems: 30
          items:
            $ref: '#/components/schemas/AnswerOptionRequest'
        likertScale:
          $ref: '#/components/schemas/LikertScaleRequest'
        popupDefinition:
          oneOf:
            - $ref: '#/components/schemas/PopupDefinitionRequest'
            - type: 'null'
    Questionnaire:
      type: object
      required: [id, code, title, defaultLanguage, versionId, version, versionLabel, language, status, isPublished, groupCount, questionCount, groups]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        defaultLanguage:
          type: string
        versionId:
          type: string
          format: uuid
        version:
          type: string
        versionLabel:
          type: string
        language:
          type: string
        finality:
          type: [string, 'null']
        status:
          type: string
        isPublished:
          type: boolean
        openFrom:
          type: [string, 'null']
          format: date-time
        openUntil:
          type: [string, 'null']
          format: date-time
        groupCount:
          type: integer
          minimum: 0
        questionCount:
          type: integer
          minimum: 0
        groups:
          type: array
          items:
            type: object
            additionalProperties: true
