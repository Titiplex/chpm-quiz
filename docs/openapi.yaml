          type: string
          format: uuid
        organizationId:
          type: [string, 'null']
          format: uuid
        requestReference:
          type: string
        legalBasisDescription:
          type: string
        courtOrderReference:
          type: [string, 'null']
        requestedPublicCodes:
          type: array
          items:
            type: string
        requestedBy:
          type: string
        status:
          type: string
          enum: [received, validated, rejected, executed, closed]
        exportFingerprint:
          type: [string, 'null']
        exportExpiresAt:
          type: [string, 'null']
          format: date-time
        exportDeletedAt:
          type: [string, 'null']
          format: date-time
        dpoValidationUserId:
          type: [string, 'null']
          format: uuid
        legalValidationUserId:
          type: [string, 'null']
          format: uuid
        comments:
          type: [string, 'null']
      additionalProperties: true
