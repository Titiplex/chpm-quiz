name: chpm-survey-production

services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must be pinned}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_MIGRATOR_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD:?POSTGRES_MIGRATOR_PASSWORD is required}
      POSTGRES_OPERATIONAL_PASSWORD: ${POSTGRES_OPERATIONAL_PASSWORD:?POSTGRES_OPERATIONAL_PASSWORD is required}
      POSTGRES_IDENTITY_PASSWORD: ${POSTGRES_IDENTITY_PASSWORD:?POSTGRES_IDENTITY_PASSWORD is required}
      POSTGRES_DPO_PASSWORD: ${POSTGRES_DPO_PASSWORD:?POSTGRES_DPO_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init-production.sh:/docker-entrypoint-initdb.d/10-chpm-roles.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  migrator:
    image: chpm-backend-build:${CHPM_RELEASE_VERSION:?CHPM_RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
      args:
        NODE_IMAGE: ${NODE_IMAGE:?NODE_IMAGE must be pinned}
    environment:
      DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
    command:
      [
        'sh',
        '-c',
        'node scripts/prisma.mjs validate && node scripts/prisma.mjs migrate deploy && npm run db:apply-dpo-grants && node scripts/prisma.mjs migrate status',
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks: [internal]

  backend:
    image: chpm-backend:${CHPM_RELEASE_VERSION:?CHPM_RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
      args:
        NODE_IMAGE: ${NODE_IMAGE:?NODE_IMAGE must be pinned}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      OPERATIONAL_DATABASE_URL: ${OPERATIONAL_DATABASE_URL:?OPERATIONAL_DATABASE_URL is required}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:?IDENTITY_DATABASE_URL is required}
      DATABASE_URL: ${OPERATIONAL_DATABASE_URL:?OPERATIONAL_DATABASE_URL is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-__Host-chpm_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-strict}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-240}
      RATE_LIMIT_LOGIN_MAX_REQUESTS: ${RATE_LIMIT_LOGIN_MAX_REQUESTS:-10}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_LOCK_MINUTES: ${AUTH_LOGIN_LOCK_MINUTES:-15}
      AUTH_PROVIDER: ${AUTH_PROVIDER:?AUTH_PROVIDER is required}
      ALLOW_LOCAL_AUTH_IN_PRODUCTION: ${ALLOW_LOCAL_AUTH_IN_PRODUCTION:-false}
      AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER:?AUTH_OIDC_ISSUER is required}
      AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID:?AUTH_OIDC_CLIENT_ID is required}
      AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET:?AUTH_OIDC_CLIENT_SECRET is required}
      AUTH_OIDC_REDIRECT_URI: ${AUTH_OIDC_REDIRECT_URI:?AUTH_OIDC_REDIRECT_URI is required}
      AUTH_OIDC_SCOPES: ${AUTH_OIDC_SCOPES:-openid email profile}
      AUTH_OIDC_REQUIRED_ACR: ${AUTH_OIDC_REQUIRED_ACR:-}
      AUTH_OIDC_REQUIRED_AMR: ${AUTH_OIDC_REQUIRED_AMR:-}
      RESPONDENT_TOKEN_SECRET: ${RESPONDENT_TOKEN_SECRET:?RESPONDENT_TOKEN_SECRET is required}
      RESPONDENT_TOKEN_TTL_DAYS: ${RESPONDENT_TOKEN_TTL_DAYS:-30}
      EMAIL_ENCRYPTION_KEY_B64: ${EMAIL_ENCRYPTION_KEY_B64:?EMAIL_ENCRYPTION_KEY_B64 is required}
      EMAIL_HASH_PEPPER: ${EMAIL_HASH_PEPPER:?EMAIL_HASH_PEPPER is required}
      JUDICIAL_EXPORT_KEY_B64: ${JUDICIAL_EXPORT_KEY_B64:?JUDICIAL_EXPORT_KEY_B64 is required}
      JUDICIAL_EXPORT_KEY_REF: ${JUDICIAL_EXPORT_KEY_REF:-env:JUDICIAL_EXPORT_KEY_B64}
      JUDICIAL_EXPORT_TTL_MINUTES: ${JUDICIAL_EXPORT_TTL_MINUTES:-60}
      EMAIL_IDENTITY_DISABLED_FOR_APP: ${EMAIL_IDENTITY_DISABLED_FOR_APP:-true}
      EXPOSE_RESPONDENT_DEV_LINKS: ${EXPOSE_RESPONDENT_DEV_LINKS:-false}
      STATISTICS_MIN_GROUP_SIZE: ${STATISTICS_MIN_GROUP_SIZE:-10}
      DRAFT_RETENTION_DAYS: ${DRAFT_RETENTION_DAYS:-45}
      IDENTITY_RETENTION_DAYS: ${IDENTITY_RETENTION_DAYS:-365}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-730}
      RESPONSE_RETENTION_DAYS: ${RESPONSE_RETENTION_DAYS:-730}
      ENABLE_RETENTION_WORKER: ${ENABLE_RETENTION_WORKER:-true}
      RETENTION_WORKER_INTERVAL_MINUTES: ${RETENTION_WORKER_INTERVAL_MINUTES:-1440}
      DPO_CONTACT: ${DPO_CONTACT:?DPO_CONTACT is required}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:?EMAIL_PROVIDER is required}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CHPM Survey}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET:-}
      EMAIL_JOB_MAX_ATTEMPTS: ${EMAIL_JOB_MAX_ATTEMPTS:-5}
      EMAIL_JOB_RETRY_DELAY_MS: ${EMAIL_JOB_RETRY_DELAY_MS:-1000}
      SMS_PROVIDER: ${SMS_PROVIDER:-disabled}
      SMS_SENDER: ${SMS_SENDER:-CHPM}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      SMS_JOB_MAX_ATTEMPTS: ${SMS_JOB_MAX_ATTEMPTS:-5}
      SMS_JOB_RETRY_DELAY_MS: ${SMS_JOB_RETRY_DELAY_MS:-1000}
      DELIVERY_QUEUE_POLL_MS: ${DELIVERY_QUEUE_POLL_MS:-2000}
      PROVIDER_HTTP_TIMEOUT_MS: ${PROVIDER_HTTP_TIMEOUT_MS:-10000}
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN is required}
      ENABLE_NOTIFICATION_DIGEST_WORKER: ${ENABLE_NOTIFICATION_DIGEST_WORKER:-true}
      NOTIFICATION_DIGEST_WORKER_INTERVAL_MS: ${NOTIFICATION_DIGEST_WORKER_INTERVAL_MS:-3600000}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3000/api/health/ready']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  frontend:
    image: chpm-frontend:${CHPM_RELEASE_VERSION:?CHPM_RELEASE_VERSION is required}
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:?NODE_IMAGE must be pinned}
        NGINX_IMAGE: ${NGINX_IMAGE:?NGINX_IMAGE must be pinned}
        VITE_APP_NAME: ${VITE_APP_NAME:-CHPM Survey}
        VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION:-Secure questionnaire platform}
        VITE_DEFAULT_LOCALE: ${VITE_DEFAULT_LOCALE:-en}
        VITE_API_BASE_URL: /api
        VITE_I18N_CONTENT_BASE_URL: ${VITE_I18N_CONTENT_BASE_URL:-/content/i18n}
        VITE_STATIC_PAGES_DEMO: 'false'
        VITE_ROUTER_MODE: history
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=8m
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']
    cap_add: ['CHOWN', 'SETGID', 'SETUID', 'NET_BIND_SERVICE']
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  reverse-proxy:
    image: ${NGINX_IMAGE:?NGINX_IMAGE must be pinned}
    restart: unless-stopped
    environment:
      CHPM_HOSTNAME: ${CHPM_HOSTNAME:?CHPM_HOSTNAME is required}
      NGINX_ENVSUBST_FILTER: CHPM_HOSTNAME
    volumes:
      - ./ops/nginx/reverse-proxy.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${TLS_CERT_DIR:?TLS_CERT_DIR is required}:/etc/nginx/tls:ro
    ports: ['80:80', '443:443']
    security_opt: ['no-new-privileges:true']
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'https://127.0.0.1/healthz', '--no-check-certificate']
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [internal, public]

  bootstrap:
    profiles: ['bootstrap']
    image: chpm-backend-build:${CHPM_RELEASE_VERSION:?CHPM_RELEASE_VERSION is required}
    environment:
      DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
      OPERATIONAL_DATABASE_URL: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required}
      BOOTSTRAP_ORGANIZATION_CODE: ${BOOTSTRAP_ORGANIZATION_CODE:?BOOTSTRAP_ORGANIZATION_CODE is required}
      BOOTSTRAP_ORGANIZATION_NAME: ${BOOTSTRAP_ORGANIZATION_NAME:?BOOTSTRAP_ORGANIZATION_NAME is required}
      BOOTSTRAP_SITE_CODE: ${BOOTSTRAP_SITE_CODE:?BOOTSTRAP_SITE_CODE is required}
      BOOTSTRAP_SITE_NAME: ${BOOTSTRAP_SITE_NAME:?BOOTSTRAP_SITE_NAME is required}
      BOOTSTRAP_BUILDING_CODE: ${BOOTSTRAP_BUILDING_CODE:?BOOTSTRAP_BUILDING_CODE is required}
      BOOTSTRAP_BUILDING_LABEL: ${BOOTSTRAP_BUILDING_LABEL:?BOOTSTRAP_BUILDING_LABEL is required}
      BOOTSTRAP_CITY: ${BOOTSTRAP_CITY:?BOOTSTRAP_CITY is required}
      BOOTSTRAP_COUNTRY: ${BOOTSTRAP_COUNTRY:?BOOTSTRAP_COUNTRY is required}
      BOOTSTRAP_TIMEZONE: ${BOOTSTRAP_TIMEZONE:?BOOTSTRAP_TIMEZONE is required}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?BOOTSTRAP_ADMIN_EMAIL is required}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:?BOOTSTRAP_ADMIN_DISPLAY_NAME is required}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
    command: ['npm', 'run', 'bootstrap:production']
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: 'no'
    networks: [internal]

  encrypted-backup:
    profiles: ['maintenance']
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must be pinned}
    environment:
      OPERATIONAL_DATABASE_URL: ${OPERATIONAL_DATABASE_URL:?OPERATIONAL_DATABASE_URL is required}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:?IDENTITY_DATABASE_URL is required}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:?BACKUP_ENCRYPTION_PASSPHRASE is required}
    volumes:
      - ./ops/scripts:/ops/scripts:ro
      - ${BACKUP_OUTPUT_DIR:?BACKUP_OUTPUT_DIR is required}:/backups
    entrypoint: ['/bin/sh', '/ops/scripts/backup_encrypted.sh']
    networks: [internal]

volumes:
  postgres-data:

networks:
  internal:
    internal: true
  public:
