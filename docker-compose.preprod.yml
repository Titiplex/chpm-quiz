services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    env_file:
      - .env.preprod
    command: sh -c "node scripts/prisma.mjs validate && node scripts/prisma.mjs migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - .env.preprod
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-CHPM Survey}
        VITE_API_BASE_URL: /api
        VITE_I18N_CONTENT_BASE_URL: /content/i18n
        VITE_STATIC_PAGES_DEMO: "false"
        VITE_ROUTER_MODE: history
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/reverse-proxy.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_DIR:?TLS_CERT_DIR is required}:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://127.0.0.1/healthz", "--no-check-certificate"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

  encrypted-backup:
    image: postgres:17-alpine
    profiles: ["maintenance"]
    env_file:
      - .env.preprod
    volumes:
      - ./ops/scripts:/ops/scripts:ro
      - ${BACKUP_OUTPUT_DIR:-./backups}:/backups
    entrypoint: ["/bin/sh", "/ops/scripts/backup_encrypted.sh"]
    networks:
      - internal

volumes:
  postgres-data:

networks:
  internal:
    internal: true
  public:
