name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chpm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chpm_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chpm_ci?schema=public
      OPERATIONAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chpm_ci?schema=public
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chpm_ci?schema=identity
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chpm_ci_shadow?schema=public
      NODE_ENV: test
      FRONTEND_ORIGIN: http://localhost:5173
      RESPONDENT_TOKEN_SECRET: ci-respondent-token-secret-change-me-32chars
      EMAIL_ENCRYPTION_KEY_B64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      EMAIL_HASH_PEPPER: ci-email-pepper-change-me-32chars
      JUDICIAL_EXPORT_KEY_B64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      COOKIE_SECURE: "false"
      EMAIL_PROVIDER: simulation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Install dependencies
        run: npm install

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Prisma validate
        run: npm --prefix backend run prisma:validate

      - name: Migration dry-run status
        run: |
          createdb postgresql://postgres:postgres@localhost:5432/chpm_ci_shadow || true
          npm --prefix backend run prisma:migrate:dry-run > /tmp/chpm-migration-dry-run.sql
          npm --prefix backend run prisma:migrate:deploy
          npm --prefix backend run prisma:migrate:status

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and functional tests
        run: npm run test

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Test coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            backend/coverage/

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: |
          npm audit --audit-level=high
          npm --prefix backend audit --audit-level=high
