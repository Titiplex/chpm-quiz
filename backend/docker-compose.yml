services:
  postgres:
    image: postgres:16-alpine
    container_name: chpm-quiz-postgres
    environment:
      POSTGRES_DB: chpm_quiz
      POSTGRES_USER: chpm
      POSTGRES_PASSWORD: chpm
    ports:
      - "5432:5432"
    volumes:
      - chpm_quiz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chpm -d chpm_quiz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chpm_quiz_pgdata:
